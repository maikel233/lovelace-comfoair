name: Release

# Push auf master: Typecheck + Tests + Build. Danach Release. Die Release-Version ist die
# `version` aus package.json (Tag vX.Y.Z); existiert dieser Tag schon, wird automatisch die
# Patch-Version erhöht. Für gezielte minor/major-Sprünge die `version` in package.json setzen.
# Das gebaute comfoair-card.js wird ins Repo committet (HACS-Auflösung via My-Link braucht die
# Datei im Default-Branch) UND als Release-Asset angehängt.

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Resolve version
        id: ver
        run: |
          git fetch --tags --force
          V=$(node -p "require('./package.json').version")
          if git rev-parse -q --verify "refs/tags/v$V" >/dev/null; then
            echo "Tag v$V exists -> bumping patch"
            V=$(npm version patch --no-git-tag-version | sed 's/^v//')
          fi
          # CARD_VERSION im Quellcode auf die Release-Version ziehen
          node -e "const fs=require('fs');const p='src/const.ts';fs.writeFileSync(p,fs.readFileSync(p,'utf8').replace(/CARD_VERSION = '[^']*'/, \"CARD_VERSION = '$V'\"))"
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Build bundle
        run: npm run build
      - name: Commit bundle + version (if changed)
        run: |
          V="${{ steps.ver.outputs.version }}"
          git add comfoair-card.js package.json package-lock.json src/const.ts
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): v$V [skip ci]"
          fi
      - name: Tag and push
        run: |
          V="${{ steps.ver.outputs.version }}"
          git tag "v$V" 2>/dev/null || true
          git push origin HEAD:master
          git push origin "v$V"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: comfoair-card.js
          generate_release_notes: true
