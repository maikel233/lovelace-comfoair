name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches-ignore: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Check committed bundle is current
        run: |
          test -f comfoair-card.js
          if ! git diff --exit-code -- comfoair-card.js; then
            echo "::warning::comfoair-card.js weicht vom Build ab — 'npm run build' ausführen und committen (wird beim Release sonst automatisch aktualisiert)."
          fi
